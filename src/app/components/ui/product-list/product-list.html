@if (products().length > 0) {
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-4 gap-y-16">
        @for (product of products(); track product.id) {
            <div class="flex">
                <app-product-card [product]="product" />
            </div>
        }
    </div>
}
